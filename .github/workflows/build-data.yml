name: Build dashboard data

on:
  push:
    paths:
      - 'data/*.csv'
      - 'data/*.json'
      - 'build_data.py'
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate data.json
        run: python3 build_data.py
      - name: Commit if changed
        run: |
          git config user.name "ecodulce-bot"
          git config user.email "bot@ecodulce.local"
          git add data/data.json
          git diff --staged --quiet || git commit -m "Auto-actualizar data.json desde Sheets"
          git push
