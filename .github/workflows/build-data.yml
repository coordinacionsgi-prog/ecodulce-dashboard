name: Build dashboard data

on:
  push:
    paths:
      - 'data/*.csv'
      - 'data/*.json'
      - 'build_data.py'
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-dashboard-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate data.json
        run: python3 build_data.py
      - name: Commit if changed
        run: |
          git config user.name "ecodulce-bot"
          git config user.email "bot@ecodulce.local"
          git pull --rebase origin main
          python3 build_data.py
          git add data/data.json
          git diff --staged --quiet || git commit -m "Auto-actualizar data.json desde Sheets"
          for i in 1 2 3 4 5; do
            git push && break
            git pull --rebase origin main
            python3 build_data.py
            git add data/data.json
            git diff --staged --quiet || git commit --amend --no-edit
            sleep 2
          done
